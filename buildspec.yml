version: 0.2
phases:
  install:
    # runtime-versions:
    #   nodejs: 20
    commands:
      - echo "Node version:"
      - node --version
      - echo "NPM version:"
      - npm --version
  pre_build:
    commands:
      - echo "Installing dependencies..."
      - npm install
  build:
    commands:
      - echo "Building application..."
      - npm run build
artifacts:
  files:
    - '**/*'
